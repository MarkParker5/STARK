name: Publish to PyPI and Create Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  version:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v2
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install

      - name: Version bump
        id: version
        run: |
          if [[ "v$(poetry version --short)" == "$(git describe --tags --always --abbrev=0)" ]]; then
            poetry version patch
            git add pyproject.toml
            git config --global user.email "mark@parker-programs.com"
            git config --global user.name "MarkParker5"
            git commit -m "Version bump v$(poetry version --short)"
            git push
            echo Version bumped to $(poetry version --short)
          fi
          echo Using version $(poetry version --short)
          echo VERSION="v$(poetry version --short)" >> $GITHUB_OUTPUT

  build:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"] #, "3.14"] some deps still need to catch up
    steps:
      - uses: actions/checkout@v3
        with:
          ref: master
          fetch-depth: 0

      - uses: actions/setup-python@v2
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install

      - name: Build wheel
        run: poetry build -f wheel

      - name: Build sdist
        if: matrix.python-version == '3.12'
        run: poetry build -f sdist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.python-version }}
          path: dist/*

  publish:
    needs: [version, build]
    permissions:
      id-token: write
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: master
          fetch-depth: 0

      - uses: actions/setup-python@v2
        with:
          python-version: "3.12"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Create tag
        uses: rickstaa/action-create-tag@v1
        with:
          tag: ${{ needs.version.outputs.version }}

      - name: Generate changelog
        id: changelog
        run: |
          changelog=$(git log --pretty=format:"- %s" "${{ needs.version.outputs.version }}..HEAD")

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}
        with:
          tag_name: ${{ needs.version.outputs.version }}
          release_name: Release ${{ needs.version.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false

      - name: Upload wheel files
        run: |
          for whl in dist/*.whl; do
            gh release upload "${{ needs.version.outputs.version }}" "$whl" --clobber
          done
        env:
          GH_TOKEN: ${{ secrets.GIT_TOKEN }}
